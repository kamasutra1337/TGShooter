<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0e14" />
    <title>TG Shooter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <!-- HUD -->
      <div id="hud" class="hidden">
        <div id="crosshair"></div>
        <div id="hud-top">
          <div id="score">0</div>
        </div>
        <div id="pot-banner" class="hidden">POT 0 TON</div>
        <div id="hud-bottom">
          <div id="health-wrap">
            <div id="health-icon">✚</div>
            <div id="health-bar"><div id="health-fill"></div></div>
            <div id="health-num">100</div>
          </div>
          <div id="ammo-wrap">
            <span id="ammo-mag">30</span><span id="ammo-sep">/</span
            ><span id="ammo-reserve">90</span>
          </div>
        </div>
        <div id="hitmarker" class="hidden">✕</div>
        <div id="damage-flash"></div>
      </div>

      <!-- Mobile touch controls -->
      <div id="touch" class="hidden">
        <div id="move-stick" class="stick"><div class="knob"></div></div>
        <div id="look-pad"></div>
        <button id="btn-fire" class="tbtn">🔫</button>
        <button id="btn-jump" class="tbtn">⤴</button>
        <button id="btn-reload" class="tbtn">⟳</button>
      </div>

      <!-- Start / menu overlay -->
      <div id="menu">
        <div class="menu-card">
          <h1>TG&nbsp;SHOOTER</h1>
          <p class="sub">Web3 FPS · TON · vertical slice</p>
          <div id="mode-row">
            <button class="mode-chip active" data-mode="duel">
              <b>1 vs 1</b>
              Duel · stake TON
            </button>
            <button class="mode-chip" data-mode="elimination">
              <b>Battle</b>
              5 players · last stands
            </button>
          </div>
          <div id="stake-row">
            <span>Stake per player</span>
            <select id="stake-select">
              <option value="0.5">0.5 TON</option>
              <option value="1" selected>1 TON</option>
              <option value="2">2 TON</option>
              <option value="5">5 TON</option>
            </select>
          </div>
          <div id="wallet-row">
            <span id="wallet-status">Wallet: not connected</span>
            <button id="btn-wallet" class="ghost">Connect TON</button>
          </div>
          <button id="btn-play" class="primary">PLAY</button>
          <p class="hint" id="controls-hint"></p>
        </div>
      </div>
      <!-- Result overlay -->
      <div id="result" class="hidden">
        <div class="result-card">
          <h2 id="result-title">VICTORY</h2>
          <div class="payout" id="result-payout"></div>
          <button id="btn-again" class="primary">RETURN TO LOBBY</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
