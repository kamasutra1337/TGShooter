<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0e14" />
    <title>TG Shooter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <!-- HUD -->
      <div id="hud" class="hidden">
        <div id="crosshair" class="style-cross">
          <span class="ch-arm ch-up"></span>
          <span class="ch-arm ch-down"></span>
          <span class="ch-arm ch-left"></span>
          <span class="ch-arm ch-right"></span>
          <span class="ch-ring"></span>
          <span class="ch-center"></span>
        </div>
        <div id="hud-top">
          <div id="score">0</div>
        </div>
        <div id="team-status" class="hidden">
          <span id="team-mine">5</span>
          <span class="ts-vs">vs</span>
          <span id="team-foe">5</span>
        </div>
        <div id="pot-banner" class="hidden">POT 0 TON</div>
        <div id="killfeed"></div>
        <div id="countdown" class="hidden"></div>
        <div id="hud-bottom">
          <div id="health-wrap">
            <div id="health-icon">✚</div>
            <div id="health-bar"><div id="health-fill"></div></div>
            <div id="health-num">100</div>
          </div>
          <div id="ammo-wrap">
            <span id="ammo-mag">30</span><span id="ammo-sep">/</span
            ><span id="ammo-reserve">90</span>
          </div>
        </div>
        <div id="hitmarker" class="hidden">✕</div>
        <div id="damage-flash"></div>
        <div id="spectate" class="hidden"></div>
      </div>

      <!-- Mobile touch controls -->
      <div id="touch" class="hidden">
        <div id="move-stick" class="stick"><div class="knob"></div></div>
        <div id="look-pad"></div>
        <button id="btn-fire" class="tbtn">🔫</button>
        <button id="btn-jump" class="tbtn">⤴</button>
        <button id="btn-reload" class="tbtn">⟳</button>
      </div>

      <!-- Start / menu overlay -->
      <div id="menu">
        <div class="menu-card">
          <h1>TG&nbsp;SHOOTER</h1>
          <p class="sub">Web3 FPS · TON · vertical slice</p>
          <div id="mode-row">
            <button class="mode-chip active" data-mode="duel">
              <b>1 vs 1</b>
              Duel · stake TON
            </button>
            <button class="mode-chip" data-mode="elimination">
              <b>5 vs 5</b>
              Team battle · last team stands
            </button>
          </div>
          <div id="stake-row">
            <span>Stake per player</span>
            <select id="stake-select">
              <option value="0.5">0.5 TON</option>
              <option value="1" selected>1 TON</option>
              <option value="2">2 TON</option>
              <option value="5">5 TON</option>
            </select>
          </div>
          <div id="wallet-row">
            <span id="wallet-status">Wallet: not connected</span>
            <button id="btn-wallet" class="ghost">Connect TON</button>
          </div>
          <button id="btn-play" class="primary">PLAY · ONLINE</button>
          <button id="btn-practice" class="ghost wide">Practice vs bots (offline)</button>
          <div id="menu-actions">
            <button id="btn-create-room" class="ghost">👥 Create room</button>
            <button id="btn-join-room" class="ghost">Join room</button>
          </div>
          <div id="menu-actions">
            <button id="btn-board" class="ghost">🏆 Leaderboard</button>
            <button id="btn-settings" class="ghost">⚙ Settings</button>
          </div>
          <p class="net-status" id="net-status"></p>
          <p class="hint" id="controls-hint"></p>
        </div>
      </div>
      <!-- Weekly leaderboard overlay -->
      <div id="leaderboard" class="hidden">
        <div class="board-card">
          <div class="board-head">
            <h2>🏆 Weekly Leaderboard</h2>
            <span id="board-week"></span>
          </div>
          <div id="board-body">
            <p class="board-msg">Loading…</p>
          </div>
          <button id="btn-board-close" class="primary">CLOSE</button>
        </div>
      </div>

      <!-- Settings overlay -->
      <div id="settings" class="hidden">
        <div class="panel-card">
          <div class="panel-head">
            <h2>⚙ Settings</h2>
          </div>
          <div class="set-row">
            <span>Crosshair</span>
            <div class="seg">
              <button class="ch-style active" data-ch="cross">✛ Cross</button>
              <button class="ch-style" data-ch="circle">◎ Circle</button>
            </div>
          </div>
          <div class="set-row">
            <span>Color</span>
            <input type="color" id="ch-color" value="#37e0a6" />
          </div>
          <div class="set-row">
            <span>Sound</span>
            <div class="seg">
              <button class="snd-opt" data-snd="on">On</button>
              <button class="snd-opt" data-snd="off">Off</button>
            </div>
          </div>
          <div class="swatches" id="ch-swatches"></div>
          <div class="ch-preview">
            <div id="ch-preview-box">
              <div id="crosshair-preview" class="style-cross">
                <span class="ch-arm ch-up"></span>
                <span class="ch-arm ch-down"></span>
                <span class="ch-arm ch-left"></span>
                <span class="ch-arm ch-right"></span>
                <span class="ch-ring"></span>
                <span class="ch-center"></span>
              </div>
            </div>
          </div>
          <button id="btn-settings-close" class="primary">DONE</button>
        </div>
      </div>

      <!-- Join by code overlay -->
      <div id="join-code" class="hidden">
        <div class="panel-card">
          <div class="panel-head"><h2>Join Room</h2></div>
          <p class="muted-line">Enter the 4-digit code from your friend</p>
          <input
            id="join-code-input"
            inputmode="numeric"
            maxlength="4"
            placeholder="0000"
            autocomplete="off"
          />
          <div id="menu-actions">
            <button id="btn-join-cancel" class="ghost">Cancel</button>
            <button id="btn-join-confirm" class="primary">Join</button>
          </div>
          <p id="join-error" class="net-status err"></p>
        </div>
      </div>

      <!-- Private room lobby -->
      <div id="room" class="hidden">
        <div class="panel-card">
          <div class="panel-head">
            <h2>Private Room</h2>
            <span id="room-code" class="room-code"></span>
          </div>
          <p id="room-sub" class="muted-line"></p>
          <div id="room-players"></div>
          <button id="btn-room-start" class="primary hidden">START MATCH</button>
          <button id="btn-room-ready" class="ghost wide">I'm ready</button>
          <button id="btn-room-leave" class="ghost wide">Leave room</button>
          <p id="room-error" class="net-status err"></p>
        </div>
      </div>

      <!-- Result overlay -->
      <div id="result" class="hidden">
        <div class="result-card">
          <h2 id="result-title">VICTORY</h2>
          <div class="payout" id="result-payout"></div>
          <button id="btn-again" class="primary">RETURN TO LOBBY</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
